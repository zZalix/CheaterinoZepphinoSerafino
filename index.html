<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA CRITTOGRAFICO ZEPH</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #0f0; cursor: crosshair; user-select: none; }
        .full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: #000; }
        .tempio-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://i.ibb.co/3d53m3b/zeph-tempio-matrix.png'); background-size: cover; background-position: center; filter: blur(8px) brightness(0.15) grayscale(0.5); }
        #hacker-console { position: fixed; top: 20px; left: 20px; width: 350px; font-size: 0.8rem; color: #0f0; z-index: 5; text-shadow: 0 0 5px #0f0; pointer-events: none; }
        .console-line { margin-bottom: 5px; opacity: 0; transform: translateX(-10px); transition: 0.5s; }
        #zone-left { position: fixed; top: 0; left: 0; width: 250px; height: 250px; z-index: 999; }
        #zone-right { position: fixed; top: 0; right: 0; width: 250px; height: 250px; z-index: 999; }
        #flash { position: fixed; top: 0; width: 400px; height: 400px; z-index: 998; pointer-events: none; opacity: 0; transition: opacity 0.1s; }
        .pixel-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-image: linear-gradient(rgba(0,255,0,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,0,0.1) 1px, transparent 1px); background-size: 4px 4px; pointer-events: none; }
        .login-box { z-index: 10; background: rgba(0,0,0,0.95); padding: 40px; border: 1px solid #111; text-align: center; box-shadow: 0 0 60px rgba(0,0,0,1); border-radius: 2px; width: 420px; }
        input { background: #050505; border: 1px solid #1a1a1a; color: #0f0; padding: 12px; margin: 20px auto; width: 85%; font-family: monospace; text-align: center; font-size: 1.1rem; outline: none; }
        button { background: #0a0a0a; color: #0f0; border: 1px solid #111; padding: 12px 25px; text-transform: uppercase; letter-spacing: 3px; width: 100%; cursor: pointer; }
        #timer { margin-top: 25px; font-size: 3.2rem; color: #ffcc00; font-weight: bold; }
        .hint-text { color: #333; font-size: 0.75rem; margin-top: 20px; letter-spacing: 1px; line-height: 1.4; font-weight: bold; }
        .sub-hint { color: #1a1a1a; font-size: 0.8rem; margin-top: 10px; letter-spacing: 3px; }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return (event.keyCode != 123 && !event.ctrlKey && !event.metaKey)"> 

    <div id="hacker-console"></div>
    <div id="zone-left"></div>
    <div id="zone-right"></div>
    <div id="flash"></div>

    <div class="full-bg"><div class="tempio-base"></div></div>
    <div class="pixel-overlay"></div>

    <div class="login-box">
        <h2 style="color: #fff; margin: 0; letter-spacing: 5px;">SISTEMA CRITICO</h2>
        <input type="password" id="main-input" placeholder="********" autocomplete="off">
        <button id="decript-btn">DECRIPT</button>
        <div id="timer">24:00:00</div>
        <div class="hint-text">
            3 passi avanti, 5 passi indietro.<br>
            Solo chi resta in equilibrio trova la porta.
        </div>
        <div class="sub-hint">65gr0g2DZ6u</div>
    </div>

    <script>
        (function() {
            document.addEventListener('keydown', function(e) {
                // Blocca F12, Ctrl+S, Ctrl+U, Ctrl+Shift+I, Ctrl+Shift+J
                if (e.keyCode == 123 || 
                    (e.ctrlKey && (e.keyCode == 83 || e.keyCode == 85 || (e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))))) {
                    e.preventDefault();
                    return false;
                }
            });

            let _m = ""; 
            let _c = ""; 
            
            const _p1 = "dQw4";
            const _p2 = "w9Wg";
            const _p3 = "XcQ";
            const _pFull = _p1 + _p2 + _p3;

            const check = () => {
                const val = document.getElementById('main-input').value;
                const _k = ["w", "i", "f", "i", "e", "s"].join("");
                if (val.toLowerCase() === _k) {
                    window.location.replace("about:blank");
                }
            };
            document.getElementById('decript-btn').addEventListener('click', check);

            function tf(side) {
                const f = document.getElementById('flash');
                f.style.left = side === 'left' ? '0' : 'auto';
                f.style.right = side === 'right' ? '0' : 'auto';
                f.style.background = side === 'left' ? 'radial-gradient(circle at top left, rgba(255,0,0,0.4) 0%, transparent 70%)' : 'radial-gradient(circle at top right, rgba(0,255,0,0.4) 0%, transparent 70%)';
                f.style.opacity = "1";
                setTimeout(() => f.style.opacity = "0", 150);
            }

            document.getElementById('zone-left').addEventListener('mousedown', () => { _m = "L"; _c = ""; tf('left'); });
            document.getElementById('zone-right').addEventListener('mousedown', () => { _m = "R"; _c = ""; tf('right'); });

            document.addEventListener('keydown', (e) => {
                if (e.key === "Enter") check();
                if (_m !== "" && e.key.length === 1) {
                    _c += e.key;
                    // Protezione stringhe tramite ASCII
                    const _s1 = String.fromCharCode(90, 101, 112, 104);
                    const _s2 = String.fromCharCode(90, 51, 80, 104, 95, 99, 104, 101, 97, 116);
                    const _yt = "https://youtu.be/";

                    if (_m === "L" && _c.endsWith(_s1)) {
                        window.location.href = _yt + _pFull;
                    } else if (_m === "R" && _c.endsWith(_s2)) {
                        window.location.href = _yt + "65it0i2Fb6w";
                    }
                }
            });

            const cb = document.getElementById('hacker-console');
            const lines = [
                "> [SECURE_MODE]: ENABLED",
                "> [DEV_BLOCK]: ACTIVE",
                "> Syncing... [" + _p1 + "]",
                "> Analyzing... [" + _p2 + "]",
                "> Root access... [" + _p3 + "]",
                "> Protocol: ZEPH_GATE",
                "> Waiting for biological auth..."
            ];

            lines.forEach((t, i) => {
                setTimeout(() => {
                    const l = document.createElement('div');
                    l.className = 'console-line';
                    l.innerText = t;
                    l.style.opacity = "1";
                    l.style.transform = "translateX(0)";
                    cb.appendChild(l);
                }, i * 800);
            });

            let tl = 86400;
            setInterval(() => {
                tl--;
                let h = Math.floor(tl/3600).toString().padStart(2,'0'), m = Math.floor((tl%3600)/60).toString().padStart(2,'0'), s = (tl%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        })();
    </script>
</body>
</html>
